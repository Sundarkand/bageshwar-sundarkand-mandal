<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Bageshwar Bala Ji Mandal</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="assets/logo.png" type="image/png" />
  </head>
  <body>
    <div class="announcement-bar">
      <span class="marquee-text" id="marquee-text">🚩 Loading... 🚩</span>
    </div>

    <header>
      <div class="header-top">
        <div class="header-logo-row">
          <img src="assets/logo.png" alt="Logo" class="header-logo"
               onerror="this.outerHTML='<span class=\'header-logo-fallback\'>🚩</span>'" />
          <div class="header-title-block">
            <div class="header-title">Bageshwar Bala Ji Sundarkand Mandal</div>
            <div class="header-subtitle">Nagla Dallu</div>
          </div>
        </div>
      </div>
      <nav>
        <a href="index.html">🏠 Home</a>
        <a href="upcoming.html">📅 Upcoming</a>
        <a href="live.html">📡 Live</a>
        <a href="sundarkand.html">📖 Sundarkand</a>
        <a href="gallery.html" class="active">🖼️ Gallery</a>
        <a href="donation.html">🙏 Donation</a>
        <a href="about.html">ℹ️ About</a>
        <a href="admin-login.html">⚙️ Admin</a>
      </nav>
    </header>

    <main>
      <h2 class="section-title">Divine Gallery</h2>
      <div class="gallery-grid" id="gallery-container">
        <div class="loading-container" style="grid-column:1/-1;">
          <div class="spinner"></div>
          <p>Loading gallery...</p>
        </div>
      </div>
    </main>

    <!-- Lightbox Overlay -->
    <div class="lightbox-overlay" id="lightbox-overlay" onclick="closeLightbox()">
      <span class="lightbox-close" onclick="closeLightbox()">✕</span>
      <img id="lightbox-img" src="" alt="" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <footer>
      <div class="footer-mandal-name">Bageshwar Bala Ji Sundarkand Mandal Nagla Dallu</div>
      <div class="footer-credit">Website Developed By: <strong>Aman Shankhdhar Ji</strong></div>
    </footer>

    <script type="module" src="js/gallery.js"></script>
  </body>
</html>
